<div class="projects-page">

  <!-- HERO -->
  <section class="hero text-center">
    <div class="container">
      <h1>My <span>Portfolio</span></h1>
      <p>Premium CV designs crafted for real-world success</p>
    </div>
  </section>

  <!-- FILTERS -->
  <section class="filters text-center">
    <div class="container">
      <button 
        *ngFor="let cat of categories"
        class="filter-btn"
        [class.active]="selectedCategory === cat"
        (click)="filterProjects(cat)">
        {{cat}}
      </button>
    </div>
  </section>

  <!-- PROJECT GRID -->
  <section class="projects container">
    <div class="row g-4">

      <div class="col-xl-3 col-lg-4 col-md-6 col-sm-6"
           *ngFor="let project of filteredProjects">

        <div class="project-card">

          <div class="img-box" (click)="openPreview(project.image)">
            <img 
              [src]="project.image"
              (error)="handleImageError($event)"
              alt="project"
            />

            <div class="overlay">
              <h5>{{project.title}}</h5>
              <span>{{project.category}}</span>
            </div>
          </div>

        </div>

      </div>

    </div>
  </section>

  <!-- PREVIEW MODAL -->
  <div class="preview-modal" *ngIf="selectedImage" (click)="closePreview()">
    <img [src]="selectedImage" />
  </div>

</div>
